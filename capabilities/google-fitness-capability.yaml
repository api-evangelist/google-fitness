      - method: GET
        name: getdataset
        description: Get a dataset
        call: google-fitness.getdataset
        with:
          userId: rest.userId
          dataSourceId: rest.dataSourceId
          datasetId: rest.datasetId
        outputParameters:
        - type: object
          mapping: $.
    - path: /users/{userId}/dataSources/{dataSourceId}/datasets/{datasetId}
      name: patchdataset
      operations:
      - method: PATCH
        name: patchdataset
        description: Add data points to a dataset
        call: google-fitness.patchdataset
        with:
          userId: rest.userId
          dataSourceId: rest.dataSourceId
          datasetId: rest.datasetId
        outputParameters:
        - type: object
          mapping: $.
    - path: /users/{userId}/dataset:aggregate
      name: aggregatedataset
      operations:
      - method: POST
        name: aggregatedataset
        description: Aggregate data
        call: google-fitness.aggregatedataset
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
    - path: /users/{userId}/sessions
      name: listsessions
      operations:
      - method: GET
        name: listsessions
        description: List sessions
        call: google-fitness.listsessions
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
    - path: /users/{userId}/sessions/{sessionId}
      name: updatesession
      operations:
      - method: PUT
        name: updatesession
        description: Update or insert a session
        call: google-fitness.updatesession
        with:
          userId: rest.userId
          sessionId: rest.sessionId
        outputParameters:
        - type: object
          mapping: $.
    - path: /users/{userId}/sessions/{sessionId}
      name: deletesession
      operations:
      - method: DELETE
        name: deletesession
        description: Delete a session
        call: google-fitness.deletesession
        with:
          userId: rest.userId
          sessionId: rest.sessionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: google-fitness-mcp
    transport: http
    description: MCP adapter for Google Fit REST API for AI agent use.
