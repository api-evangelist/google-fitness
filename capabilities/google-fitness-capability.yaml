naftiko: 1.0.0-alpha2
info:
  label: Google Fit REST API
  description: The Google Fit REST API enables you to store and access health and wellness data in the fitness store. You
    can manage data sources, datasets, sessions, and aggregate fitness data from apps on any platform.
  tags:
  - Google
  - Fitness
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: google-fitness
    baseUri: https://www.googleapis.com/fitness/v1
    description: Google Fit REST API HTTP API.
    authentication:
      type: bearer
      token: '{{GOOGLE_FITNESS_TOKEN}}'
    resources:
    - name: users-userid-datasources
      path: /users/{userId}/dataSources
      operations:
      - name: listdatasources
        method: GET
        description: List data sources
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: createdatasource
        method: POST
        description: Create a data source
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userid-datasources-datasourceid
      path: /users/{userId}/dataSources/{dataSourceId}
      operations:
      - name: getdatasource
        method: GET
        description: Get a data source
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        - name: dataSourceId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userid-datasources-datasourceid-datasets-d
      path: /users/{userId}/dataSources/{dataSourceId}/datasets/{datasetId}
      operations:
      - name: getdataset
        method: GET
        description: Get a dataset
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        - name: dataSourceId
          in: path
          type: string
          required: true
        - name: datasetId
          in: path
          type: string
          required: true
        - name: limit
          in: query
          type: integer
        - name: pageToken
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: patchdataset
        method: PATCH
        description: Add data points to a dataset
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        - name: dataSourceId
          in: path
          type: string
          required: true
        - name: datasetId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userid-dataset-aggregate
      path: /users/{userId}/dataset:aggregate
      operations:
      - name: aggregatedataset
        method: POST
        description: Aggregate data
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userid-sessions
      path: /users/{userId}/sessions
      operations:
      - name: listsessions
        method: GET
        description: List sessions
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        - name: startTime
          in: query
          type: string
        - name: endTime
          in: query
          type: string
        - name: pageToken
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: users-userid-sessions-sessionid
      path: /users/{userId}/sessions/{sessionId}
      operations:
      - name: updatesession
        method: PUT
        description: Update or insert a session
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        - name: sessionId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: deletesession
        method: DELETE
        description: Delete a session
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
        - name: sessionId
          in: path
          type: string
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: google-fitness-rest
    description: REST adapter for Google Fit REST API.
    resources:
    - path: /users/{userId}/dataSources
      name: listdatasources
      operations:
      - method: GET
        name: listdatasources
        description: List data sources
        call: google-fitness.listdatasources
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
    - path: /users/{userId}/dataSources
      name: createdatasource
      operations:
      - method: POST
        name: createdatasource
        description: Create a data source
        call: google-fitness.createdatasource
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
    - path: /users/{userId}/dataSources/{dataSourceId}
      name: getdatasource
      operations:
      - method: GET
        name: getdatasource
        description: Get a data source
        call: google-fitness.getdatasource
        with:
          userId: rest.userId
          dataSourceId: rest.dataSourceId
        outputParameters:
        - type: object
          mapping: $.
    - path: /users/{userId}/dataSources/{dataSourceId}/datasets/{datasetId}
      name: getdataset
